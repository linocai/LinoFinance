services:
  postgres:
    image: postgres:16
    container_name: linofinance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: linofinance
      POSTGRES_USER: linofinance
      POSTGRES_PASSWORD: linofinance
    ports:
      - "5432:5432"
    volumes:
      - linofinance-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linofinance -d linofinance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  linofinance-postgres-data:
